  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c1: #00b8f1;
      --c2: #4a58a6;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(0,184,241,0.2); color: #1a2a6c; }

    /* ── Background Orbs ── */
    .orb-layer { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(70px); }

    .orb-1 {
      width: 55vw; height: 55vw; max-width: 500px; max-height: 500px;
      background: rgba(0,220,255,0.30);
      top: -15%; left: -10%;
      animation: orbFloat1 14s ease-in-out infinite alternate;
    }
    .orb-2 {
      width: 60vw; height: 60vw; max-width: 600px; max-height: 600px;
      background: rgba(50,50,160,0.38);
      bottom: -20%; right: -10%;
      animation: orbFloat2 18s ease-in-out infinite alternate;
    }
    .orb-3 {
      width: 30vw; height: 30vw; max-width: 260px; max-height: 260px;
      background: rgba(255,255,255,0.10);
      top: 20%; right: 3%;
      animation: orbFloat3 10s ease-in-out infinite alternate;
    }

    @keyframes orbFloat1 { 0%{transform:translate(0,0)} 100%{transform:translate(50px,35px)} }
    @keyframes orbFloat2 { 0%{transform:translate(0,0)} 100%{transform:translate(-45px,-35px)} }
    @keyframes orbFloat3 { 0%{transform:translate(0,0)} 100%{transform:translate(15px,-25px)} }

    /* Grain */
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    /* ── Card ── */
    .card-wrapper {
      position: relative; z-index: 10; width: 100%; max-width: 680px;
      animation: cardEntrance 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes cardEntrance {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card {
      background: #ffffff;
      border: 1px solid rgba(255,255,255,0.95);
      border-radius: 28px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.20), 0 40px 100px rgba(0,0,0,0.16);
      padding: 36px 44px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.22), 0 48px 110px rgba(0,0,0,0.18);
    }

    /* ── Stagger animations ── */
    .fade-up {
      opacity: 0; transform: translateY(20px);
      animation: fadeUp 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .delay-1 { animation-delay: 0.40s; }
    .delay-2 { animation-delay: 0.52s; }
    .delay-3 { animation-delay: 0.62s; }
    .delay-4 { animation-delay: 0.72s; }
    .delay-5 { animation-delay: 0.82s; }
    .delay-6 { animation-delay: 0.92s; }
    .delay-7 { animation-delay: 1.02s; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    /* ── Logo ── */
    .logo-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    .logo-icon-wrap {
      position: relative;
      width: 52px; height: 52px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 20px rgba(0,184,241,0.35);
    }

    .logo-label {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-weight: 600;
      background: linear-gradient(90deg, var(--c1), var(--c2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Title ── */
    .title-section { text-align: center; }

    h1 {
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: linear-gradient(135deg, #0a1a4a 0%, var(--c2) 60%, var(--c1) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: clamp(13px, 2vw, 14px);
      color: #64748b;
      line-height: 1.6;
      font-weight: 300;
    }

    /* ── Animated Visual Element ── */
    .visual-element {
      position: relative; width: 100%; height: 80px; margin-top: 1rem;
      display: flex; align-items: center; justify-content: center;
    }

    .ring { position: absolute; border-radius: 50%; border: 1px solid; }
    .ring-outer {
      width: 130px; height: 130px;
      border-color: rgba(0,184,241,0.18);
      animation: spinCW 30s linear infinite;
    }
    .ring-middle {
      width: 92px; height: 92px;
      border-color: rgba(74,88,166,0.14);
      animation: spinCCW 20s linear infinite;
    }
    .orb-core {
      position: relative; z-index: 10;
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, rgba(0,184,241,0.10), rgba(74,88,166,0.12));
      border: 1px solid rgba(0,184,241,0.22);
      box-shadow: 0 0 28px rgba(0,184,241,0.22), 0 0 56px rgba(0,184,241,0.10);
      display: flex; align-items: center; justify-content: center;
      animation: coreGlow 3.5s ease-in-out infinite;
    }
    .orb-inner {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      box-shadow: 0 0 14px rgba(0,184,241,0.5);
      animation: innerPulse 2.5s ease-in-out infinite 0.5s;
    }
    .orbit-dot-container {
      position: absolute; width: 130px; height: 130px;
      border-radius: 50%; animation: spinCW 8s linear infinite;
    }
    .orbit-dot {
      position: absolute; top: -4px; left: 50%;
      transform: translateX(-50%);
      width: 8px; height: 8px; border-radius: 50%;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      box-shadow: 0 0 8px rgba(0,184,241,0.7);
    }

    @keyframes spinCW  { to { transform: rotate(360deg); } }
    @keyframes spinCCW { to { transform: rotate(-360deg); } }
    @keyframes coreGlow { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.08);opacity:1} }
    @keyframes innerPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

    /* ── Divider ── */
    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,184,241,0.2), rgba(74,88,166,0.2), transparent);
    }

    /* ── Section Label ── */
    .section-label {
      font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
      font-weight: 600; color: #94a3b8; text-align: center;
    }

    /* ── Contact ── */
    .contact-section { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .contact-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    .contact-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 16px;
      background: #f8faff;
      border: 1px solid #e8edf8;
      cursor: pointer; transition: all 0.22s ease; text-decoration: none;
    }
    .contact-btn:hover {
      background: #eef4ff;
      border-color: #c7d8f8;
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 6px 20px rgba(0,100,220,0.08);
    }

    .contact-icon {
      flex-shrink: 0; width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--c1), var(--c2));
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s ease;
      box-shadow: 0 3px 10px rgba(0,184,241,0.25);
    }
    .contact-btn:hover .contact-icon { transform: scale(1.08); }
    .contact-icon svg { color: white; }

    .contact-text { display: flex; flex-direction: column; }
    .contact-label {
      font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
      font-weight: 600; color: #94a3b8; line-height: 1; margin-bottom: 2px;
    }
    .contact-sublabel {
      font-size: 12px; font-weight: 500; color: #334155;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }


    /* ── CTA Button ── */
.cta-btn{
  width: 100%;
  max-width: 320px;
  margin: 0 auto;
  justify-content: center;
}
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,184,241,0.45);
    }
    .cta-btn .icon-arrow { animation: arrowBounce 1.8s ease-in-out infinite; }
    @keyframes arrowBounce { 0%,100%{transform:translateX(0)} 50%{transform:translateX(4px)} }

    /* ── Footer ── */
    .footer {
      position: relative; z-index: 10; margin-top: 14px;
      text-align: center; animation: fadeUp 0.8s 1.1s both;
    }
    .footer p { font-size: 10px; color: rgba(255,255,255,0.50); letter-spacing: 0.05em; line-height: 1.9; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      body { padding: 12px; }
      .card { padding: 24px 18px 20px; gap: 16px; border-radius: 22px; }
      .contact-grid { grid-template-columns: 1fr; gap: 8px; }
      .contact-btn { padding: 10px 12px; }
      .contact-sublabel { font-size: 11px; }
      .visual-element { height: 64px; }
      .ring-outer { width: 110px; height: 110px; }
      .ring-middle { width: 78px; height: 78px; }
      .orbit-dot-container { width: 110px; height: 110px; }
      .orb-core { width: 44px; height: 44px; }
      .orb-inner { width: 22px; height: 22px; }
      h1 { font-size: 24px; }
      .subtitle { font-size: 13px; }
      .footer { margin-top: 10px; }
      .cta-btn { padding: 12px 22px; font-size: 13px; }
    }

    @media (max-height: 680px) {
      .card { gap: 14px; padding: 22px 36px 18px; }
      .visual-element { height: 60px; }
    }
    @media (max-height: 560px) {
      .visual-element { display: none; }
      .card { gap: 12px; padding: 20px 36px 16px; }
    }

    svg { display: inline-block; vertical-align: middle; }
  </style>
</head>
